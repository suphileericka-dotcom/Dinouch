<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>DINOUCH | Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css"/>
    <link rel="stylesheet" href="style.css"/>
    <script src="catalogue.js"></script>
</head>
<body class="dinouch-theme font-body flex min-h-screen flex-col">

    <header class="site-header sticky top-0 z-50 flex items-center justify-between px-4 py-4">
        <div>
            <p class="brand-kicker text-[10px] uppercase tracking-[0.32em]">Maison de creation</p>
            <h1 class="brand-logo font-headline text-2xl font-black">DINOUCH</h1>
        </div>
        <a href="panier.html" class="circle-button flex h-11 w-11 items-center justify-center rounded-full">
            <span class="material-symbols-outlined">shopping_bag</span>
        </a>
    </header>

    <main class="mx-auto flex w-full max-w-lg flex-1 flex-col px-4 py-6 pb-32">
        <section class="hero-shell mb-8">
            <div class="hero-mark">
                <span class="material-symbols-outlined text-[30px]" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
            </div>
            <p class="hero-kicker mt-5 text-[10px] uppercase tracking-[0.38em]">Collection rose pailletee</p>
            <h2 class="hero-title font-headline mt-3 text-[3.6rem] font-black uppercase">DINOUCH</h2>
            <p class="hero-ribbon font-ribbon">on pense a vous</p>
            <p class="hero-copy mt-4 max-w-sm text-sm leading-6">
                Choisissez vos coups de coeur, ouvrez un article et ajoutez-le au panier dans une ambiance plus douce, brillante et feminine.
            </p>
        </section>

        <div id="grille-produits" class="grid grid-cols-2 gap-x-3 gap-y-8"></div>

        <div id="navigation-pages" class="theme-panel mt-10 hidden items-center justify-between gap-3 rounded-2xl px-4 py-3">
            <button id="bouton-precedent" type="button" class="soft-button rounded-full px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition">
                Precedent
            </button>
            <p id="indicateur-page" class="theme-muted text-xs font-bold uppercase tracking-[0.2em]"></p>
            <button id="bouton-suivant" type="button" class="soft-button rounded-full px-4 py-2 text-[10px] font-bold uppercase tracking-[0.2em] transition">
                Suivant
            </button>
        </div>
    </main>

    <nav class="fixed bottom-4 left-1/2 z-50 -translate-x-1/2">
        <div class="site-nav flex gap-6 rounded-full px-6 py-3">
            <a href="index.html" class="active"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span></a>
            <a href="suggestions.html"><span class="material-symbols-outlined">chat</span></a>
            <a href="panier.html"><span class="material-symbols-outlined">shopping_bag</span></a>
            <a href="admin.html"><span class="material-symbols-outlined">person</span></a>
        </div>
    </nav>

    <script>
        const grilleProduits = document.getElementById("grille-produits");
        const navigationPages = document.getElementById("navigation-pages");
        const boutonPrecedent = document.getElementById("bouton-precedent");
        const boutonSuivant = document.getElementById("bouton-suivant");
        const indicateurPage = document.getElementById("indicateur-page");
        let pageCourante = 1;

        function creerCarteProduit(produit) {
            const image = produit.image
                ? '<img src="' + window.DINOUCH.echapperTexte(produit.image) + '" alt="' + window.DINOUCH.echapperTexte(produit.nom) + '" class="h-full w-full object-cover">'
                : "<span>PHOTO</span>";

            return `
                <article class="product-card group">
                    <a href="produit.html?id=${window.DINOUCH.echapperTexte(produit.id)}" class="block">
                        <div class="relative aspect-[4/5] overflow-hidden rounded-2xl image-placeholder">
                            ${image}
                            <div class="absolute right-2 top-2 flex gap-1">
                                <span class="product-chip rounded-full px-2 py-1 text-[8px] font-bold">
                                    ${window.DINOUCH.echapperTexte(produit.tailles.join(", "))}
                                </span>
                            </div>
                        </div>
                    </a>
                    <div class="mt-3">
                        <a href="produit.html?id=${window.DINOUCH.echapperTexte(produit.id)}" class="block">
                            <h3 class="product-name truncate text-sm font-bold">${window.DINOUCH.echapperTexte(produit.nom)}</h3>
                        </a>
                        <div class="mt-1">
                            <span class="product-price text-sm font-black">${window.DINOUCH.formaterPrix(produit.prix)}</span>
                        </div>
                        <button data-produit-id="${window.DINOUCH.echapperTexte(produit.id)}" class="glitter-button add-to-cart-button mt-3 w-full rounded-2xl py-3 text-[10px] font-bold uppercase tracking-[0.2em] transition">
                            Ajouter au panier
                        </button>
                    </div>
                </article>
            `;
        }

        function afficherProduits() {
            const catalogue = window.DINOUCH.lireCataloguePublie();
            const totalPages = Math.max(1, Math.ceil(catalogue.length / window.DINOUCH.PRODUITS_PAR_PAGE));
            pageCourante = Math.min(pageCourante, totalPages);

            const debut = (pageCourante - 1) * window.DINOUCH.PRODUITS_PAR_PAGE;
            const produitsVisibles = catalogue.slice(debut, debut + window.DINOUCH.PRODUITS_PAR_PAGE);

            if (!produitsVisibles.length) {
                grilleProduits.innerHTML = '<div class="theme-empty col-span-2 rounded-2xl p-6 text-sm">Aucun produit n\'est disponible pour le moment.</div>';
            } else {
                grilleProduits.innerHTML = produitsVisibles.map(creerCarteProduit).join("");
            }

            if (totalPages > 1) {
                navigationPages.classList.remove("hidden");
                navigationPages.classList.add("flex");
                indicateurPage.textContent = "Page " + pageCourante + " sur " + totalPages;
                boutonPrecedent.disabled = pageCourante === 1;
                boutonSuivant.disabled = pageCourante === totalPages;
                boutonPrecedent.classList.toggle("opacity-40", pageCourante === 1);
                boutonSuivant.classList.toggle("opacity-40", pageCourante === totalPages);
            } else {
                navigationPages.classList.add("hidden");
                navigationPages.classList.remove("flex");
            }
        }

        grilleProduits.addEventListener("click", (evenement) => {
            const bouton = evenement.target.closest("[data-produit-id]");
            if (!bouton) {
                return;
            }

            const idProduit = bouton.dataset.produitId;
            window.DINOUCH.ajouterAuPanier(idProduit);

            const texteInitial = bouton.textContent;
            bouton.textContent = "Ajoute";
            bouton.classList.add("is-added");

            window.setTimeout(() => {
                bouton.textContent = texteInitial;
                bouton.classList.remove("is-added");
            }, 1500);
        });

        boutonPrecedent.addEventListener("click", () => {
            if (pageCourante > 1) {
                pageCourante -= 1;
                afficherProduits();
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        });

        boutonSuivant.addEventListener("click", () => {
            const totalPages = Math.max(1, Math.ceil(window.DINOUCH.lireCataloguePublie().length / window.DINOUCH.PRODUITS_PAR_PAGE));
            if (pageCourante < totalPages) {
                pageCourante += 1;
                afficherProduits();
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        });

        async function demarrerBoutique() {
            await window.DINOUCH.initialiserCatalogue();
            afficherProduits();
        }

        demarrerBoutique();
    </script>
</body>
</html>
