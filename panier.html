<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="panier.css"/>
    <script src="catalogue.js"></script>
    <title>DINOUCH | Panier</title>
</head>
<body class="bg-[#fcf9f6]">

    <header class="sticky top-0 z-50 flex items-center justify-between border-b border-gray-100 bg-[#fcf9f6]/90 px-6 py-4 backdrop-blur-sm">
        <a href="index.html" class="material-symbols-outlined cursor-pointer text-[#615e5c]">arrow_back</a>
        <h1 class="font-headline text-2xl font-black italic text-[#615e5c]">DINOUCH</h1>
        <a href="admin.html" class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-200 text-[#615e5c]">
            <span class="material-symbols-outlined text-base">person</span>
        </a>
    </header>

    <main class="mx-auto max-w-4xl px-6 py-8">
        <div class="grid grid-cols-1 gap-10 lg:grid-cols-2">
            <section class="space-y-6">
                <h2 class="font-headline text-3xl font-black">Votre <span class="italic text-[#705b44]">selection</span></h2>

                <div id="message-panier-vide" class="rounded-2xl border border-gray-50 bg-white p-6 text-sm text-[#8d8882] shadow-sm">
                    Votre panier est vide pour le moment.
                </div>

                <div id="liste-panier" class="space-y-4"></div>

                <div class="flex items-center justify-between border-t pt-6">
                    <span class="font-headline text-xl font-bold">Total</span>
                    <span id="total-panier" class="font-headline text-xl font-black">0 EUR</span>
                </div>
            </section>

            <section class="checkout-section rounded-2xl border border-gray-50 bg-white p-6 shadow-sm">
                <h3 class="font-headline mb-1 text-2xl font-bold">Finaliser la commande</h3>
                <p class="mb-8 text-xs font-light text-gray-500">Completez ce formulaire pour envoyer votre panier par email.</p>

                <form id="formulaire-commande" action="https://formspree.io/f/xaqljyjd" method="POST">
                    <div class="mb-4">
                        <label class="text-[10px] font-bold uppercase text-gray-400">Nom et prenom</label>
                        <input type="text" name="nom_client" class="custom-input mt-1 w-full rounded-lg border-none bg-gray-50 p-3 focus:ring-1 focus:ring-black" placeholder="Ex : Julienne Moreau" required>
                    </div>
                    <div class="mb-4">
                        <label class="text-[10px] font-bold uppercase text-gray-400">Telephone ou WhatsApp</label>
                        <input type="tel" name="telephone_client" class="custom-input mt-1 w-full rounded-lg border-none bg-gray-50 p-3 focus:ring-1 focus:ring-black" placeholder="+33 6 00 00 00 00" required>
                    </div>

                    <input id="champ-produits" type="hidden" name="produits_choisis" value="">

                    <button id="bouton-envoi" type="submit" class="btn-submit-order flex w-full items-center justify-center gap-2 rounded-xl bg-black py-4 font-bold text-white transition-all hover:bg-gray-800">
                        Envoyer ma commande
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <a href="index.html" class="flex items-center justify-center gap-2 text-[10px] font-bold uppercase text-gray-400 hover:text-black">
                        <span class="material-symbols-outlined text-sm">arrow_back</span>
                        Retour a la boutique
                    </a>
                </div>
            </section>
        </div>
    </main>

    <nav class="fixed bottom-6 left-1/2 z-50 flex -translate-x-1/2 gap-10 rounded-full border border-white/20 bg-white/80 px-8 py-3 shadow-2xl backdrop-blur-lg lg:hidden">
        <a href="index.html" class="text-gray-300"><span class="material-symbols-outlined">home</span></a>
        <a href="suggestions.html" class="text-gray-300"><span class="material-symbols-outlined">chat</span></a>
        <a href="panier.html" class="text-[#705b44]"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span></a>
        <a href="admin.html" class="text-gray-300"><span class="material-symbols-outlined">person</span></a>
    </nav>

    <script>
        window.DINOUCH.initialiserCatalogue();

        const listePanier = document.getElementById("liste-panier");
        const messagePanierVide = document.getElementById("message-panier-vide");
        const totalPanier = document.getElementById("total-panier");
        const champProduits = document.getElementById("champ-produits");
        const formulaireCommande = document.getElementById("formulaire-commande");
        const boutonEnvoi = document.getElementById("bouton-envoi");

        function afficherPanier() {
            const panier = window.DINOUCH.lirePanier();
            const total = panier.reduce((somme, produit) => somme + (Number(produit.prix) || 0), 0);

            totalPanier.textContent = window.DINOUCH.formaterPrix(total);
            champProduits.value = panier.map((produit, index) => {
                return (index + 1) + ". " + produit.nom + " - Taille " + (produit.taille || "Unique") + " - " + window.DINOUCH.formaterPrix(produit.prix);
            }).join("\n");

            if (!panier.length) {
                messagePanierVide.classList.remove("hidden");
                listePanier.innerHTML = "";
                boutonEnvoi.disabled = true;
                boutonEnvoi.classList.add("cursor-not-allowed", "opacity-50");
                return;
            }

            messagePanierVide.classList.add("hidden");
            boutonEnvoi.disabled = false;
            boutonEnvoi.classList.remove("cursor-not-allowed", "opacity-50");

            listePanier.innerHTML = panier.map((produit, index) => {
                const image = produit.image
                    ? '<img src="' + window.DINOUCH.echapperTexte(produit.image) + '" alt="' + window.DINOUCH.echapperTexte(produit.nom) + '" class="h-24 w-20 rounded object-cover">'
                    : '<div class="img-placeholder flex h-24 w-20 items-center justify-center rounded bg-gray-100 text-[10px] text-gray-400">PHOTO</div>';

                return `
                    <div class="cart-card flex gap-4 rounded-xl border border-gray-50 bg-white p-4 shadow-sm">
                        ${image}
                        <div class="flex-1">
                            <div class="flex items-start justify-between gap-3">
                                <h3 class="font-headline font-bold">${window.DINOUCH.echapperTexte(produit.nom)}</h3>
                                <span class="font-bold">${window.DINOUCH.formaterPrix(produit.prix)}</span>
                            </div>
                            <p class="mt-1 text-[10px] uppercase tracking-widest text-gray-500">Taille : ${window.DINOUCH.echapperTexte(produit.taille || "Unique")}</p>
                            <button type="button" data-index-panier="${index}" class="mt-3 flex items-center gap-1 text-[9px] font-black uppercase text-red-500">
                                <span class="material-symbols-outlined text-sm">delete</span> Supprimer
                            </button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        listePanier.addEventListener("click", (evenement) => {
            const bouton = evenement.target.closest("[data-index-panier]");
            if (!bouton) {
                return;
            }

            window.DINOUCH.retirerDuPanier(Number(bouton.dataset.indexPanier));
            afficherPanier();
        });

        formulaireCommande.addEventListener("submit", (evenement) => {
            if (!window.DINOUCH.lirePanier().length) {
                evenement.preventDefault();
                return;
            }

            window.setTimeout(() => {
                window.DINOUCH.viderPanier();
            }, 1000);
        });

        afficherPanier();
    </script>
</body>
</html>
